name: CI - Tests & Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend Tests with Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run backend tests in Docker Compose
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-tests
      - name: Stop backend test stack
        if: always()
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Install Root Dependencies
        run: npm ci
      - name: Install Frontend Dependencies
        run: npm ci --prefix frontend
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
