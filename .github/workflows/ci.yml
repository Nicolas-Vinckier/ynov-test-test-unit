name: CI - Tests & Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "master"]

jobs:
  backend:
    name: Backend Tests (${{ matrix.backend }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        backend: [js, python, java, php]

    steps:
      - uses: actions/checkout@v4

      - name: Validate backend test Docker Compose configuration
        env:
          BACKEND: ${{ matrix.backend }}
        run: docker compose -f docker-compose.test.yml config

      - name: Run backend tests in Docker Compose
        env:
          BACKEND: ${{ matrix.backend }}
        run: docker compose -f docker-compose.test.yml up --build --abort-on-container-exit --exit-code-from backend-tests

      - name: Stop backend test stack
        if: always()
        env:
          BACKEND: ${{ matrix.backend }}
        run: docker compose -f docker-compose.test.yml down -v --remove-orphans

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  e2e:
    name: Playwright E2E (${{ matrix.backend }})
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: js
            compose_file: docker-compose.js.yml
          - backend: python
            compose_file: docker-compose.python.yml
          - backend: java
            compose_file: docker-compose.java.yml
          - backend: php
            compose_file: docker-compose.php.yml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        shell: bash
        run: |
          PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=${PLAYWRIGHT_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps

      - name: Validate Docker Compose configuration
        run: docker compose -f "${{ matrix.compose_file }}" config

      - name: Start application stack
        run: docker compose -f "${{ matrix.compose_file }}" up -d --build

      - name: Wait for application
        run: |
          for attempt in {1..60}; do
            if curl -fsS "http://localhost/api/calculate?operation=add&a=1&b=2" > /tmp/api-response.json; then
              cat /tmp/api-response.json
              exit 0
            fi
            sleep 2
          done

          docker compose -f "${{ matrix.compose_file }}" ps
          docker compose -f "${{ matrix.compose_file }}" logs
          exit 1

      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.backend }}
          path: playwright-report/
          retention-days: 30

      - name: Stop application stack
        if: always()
        run: docker compose -f "${{ matrix.compose_file }}" down -v --remove-orphans
