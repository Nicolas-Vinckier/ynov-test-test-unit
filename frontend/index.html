<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculatrice Premium</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="calculator glass">
        <div class="display">
          <div class="previous-operand" id="previous-operand"></div>
          <div class="current-operand" id="current-operand">0</div>
        </div>
        <div class="keypad">
          <button class="btn clear" id="clear">AC</button>
          <button class="btn operator" data-op="divide">÷</button>
          <button class="btn operator" data-op="multiply">x</button>
          <button class="btn" data-num="7">7</button>
          <button class="btn" data-num="8">8</button>
          <button class="btn" data-num="9">9</button>
          <button class="btn operator" data-op="subtract">-</button>
          <button class="btn" data-num="4">4</button>
          <button class="btn" data-num="5">5</button>
          <button class="btn" data-num="6">6</button>
          <button class="btn operator" data-op="add">+</button>
          <button class="btn" data-num="1">1</button>
          <button class="btn" data-num="2">2</button>
          <button class="btn" data-num="3">3</button>
          <button class="btn equals" id="equals">=</button>
          <button class="btn span-two" data-num="0">0</button>
          <button class="btn" data-num=".">.</button>
        </div>
        <div class="status-bar" id="status-bar">
          <span class="dot"></span> Prêt
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
